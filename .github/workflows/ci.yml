name: CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'mise.toml'
      - '.goreleaser.yaml'
      - '.github/workflows/ci.yml'
      - 'install.sh'
      - 'README.md'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'mise.toml'
      - '.goreleaser.yaml'
      - '.github/workflows/ci.yml'
      - 'install.sh'
      - 'README.md'

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ runner.temp }}/go-build
      GOMODCACHE: ${{ runner.temp }}/go/pkg/mod
    steps:
      - uses: actions/checkout@v4

      - name: Extract Go version from mise.toml
        id: go-version
        run: |
          VERSION=$(grep '^go = ' mise.toml | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/go-build
            ${{ runner.temp }}/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "These files are not gofmt'd:"
            echo "$files"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/forge

      - name: Snapshot release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
