# forge's own hook config — used on this repository

[hooks.pre-commit]
enabled = true

[hooks.pre-commit.tools.gofmt]
command = "gofmt"
args = ["-w"]
type = "system"
extensions = [".go"]
restage = true
group = "format"

[hooks.pre-commit.tools.govet]
command = "go"
args = ["vet", "./..."]
type = "system"
extensions = [".go"]
pass_files = false
group = "lint"

[hooks.commit-msg]
enabled = true

[hooks.commit-msg.policy]
conventional_commits = true
append_ticket_footer = false
require_ticket = false

[hooks.pre-push]
enabled = false
