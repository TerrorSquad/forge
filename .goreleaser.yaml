version: 2

project_name: forge

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: forge
    main: ./cmd/forge
    binary: forge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/TerrorSquad/forge/internal/forge.Version={{.Version}}
      - -X github.com/TerrorSquad/forge/internal/forge.Commit={{.Commit}}
      - -X github.com/TerrorSquad/forge/internal/forge.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - forge.toml.example

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore(deps)"
      - "^Merge"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: TerrorSquad
    name: forge
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"

brews:
  - name: forge-git
    repository:
      owner: TerrorSquad
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/TerrorSquad/forge
    description: Policy-driven git hook runner — fast, portable, no Node.js required.
    license: MIT
    directory: Formula
    install: bin.install "forge"
    test: |
      system "#{bin}/forge", "version"
